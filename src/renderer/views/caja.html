<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Oma POS — Caja</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body class="bg-gray-100 text-gray-800 h-screen flex flex-col">

  <!-- Barra superior -->
  <header class="bg-blue-700 text-white px-6 py-3 flex items-center justify-between shadow">
    <h1 class="text-xl font-bold tracking-wide">Oma — Punto de Venta</h1>
    <nav class="flex gap-4 text-sm font-medium">
      <a href="caja.html"          class="px-3 py-1 rounded bg-blue-900">Caja</a>
      <a href="catalogo.html"      class="px-3 py-1 rounded hover:bg-blue-600">Catálogo</a>
      <a href="clientes.html"      class="px-3 py-1 rounded hover:bg-blue-600">Clientes</a>
      <a href="informes.html"      class="px-3 py-1 rounded hover:bg-blue-600">Informes</a>
      <a href="configuracion.html" class="px-3 py-1 rounded hover:bg-blue-600">Configuración</a>
    </nav>
  </header>

  <!-- Contenido principal -->
  <main class="flex flex-1 overflow-hidden">

    <!-- Panel izquierdo: búsqueda + lista de artículos -->
    <section class="w-1/2 flex flex-col border-r border-gray-300 bg-white p-4 gap-3">
      <h2 class="text-lg font-semibold text-gray-700">Agregar artículo</h2>
      <input
        id="busqueda"
        type="text"
        placeholder="Buscar por código o nombre..."
        class="border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"
      />
      <div id="resultados-busqueda" class="flex-1 overflow-y-auto divide-y divide-gray-100 text-sm">
        <p class="text-gray-400 py-4 text-center">Escribí para buscar artículos</p>
      </div>
    </section>

    <!-- Panel derecho: carrito + totales -->
    <section class="w-1/2 flex flex-col bg-white p-4 gap-3">
      <h2 class="text-lg font-semibold text-gray-700">Ticket actual</h2>

      <div id="carrito" class="flex-1 overflow-y-auto divide-y divide-gray-100 text-sm">
        <p class="text-gray-400 py-4 text-center">El carrito está vacío</p>
      </div>

      <!-- Totales -->
      <div class="border-t pt-3 text-sm space-y-1">
        <div class="flex justify-between text-gray-600">
          <span>Subtotal</span>
          <span id="subtotal">$0,00</span>
        </div>
        <div class="flex justify-between text-gray-600">
          <span>IVA (21%)</span>
          <span id="impuesto">$0,00</span>
        </div>
        <div class="flex justify-between font-bold text-base text-gray-900">
          <span>Total</span>
          <span id="total">$0,00</span>
        </div>
      </div>

      <!-- Forma de pago + cobrar -->
      <div class="flex gap-2">
        <select id="forma-pago" class="flex-1 border border-gray-300 rounded px-3 py-2 text-sm">
          <option value="efectivo">Efectivo</option>
          <option value="tarjeta_debito">Tarjeta débito</option>
          <option value="tarjeta_credito">Tarjeta crédito</option>
          <option value="transferencia">Transferencia</option>
          <option value="cuenta_corriente">Cuenta corriente</option>
        </select>
        <button
          id="btn-cobrar"
          class="flex-1 bg-green-600 hover:bg-green-700 text-white font-semibold rounded px-4 py-2 text-sm transition"
        >
          Cobrar
        </button>
      </div>

      <button
        id="btn-cancelar"
        class="w-full border border-red-400 text-red-500 hover:bg-red-50 rounded px-4 py-2 text-sm transition"
      >
        Cancelar venta
      </button>
    </section>
  </main>

  <script src="../js/caja.js"></script>
</body>
</html>
