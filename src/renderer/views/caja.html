<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Oma POS — Caja</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    .caja-panel-left  { width:55%; display:flex; flex-direction:column; border-right:1px solid var(--border); overflow:hidden; }
    .caja-panel-right { width:45%; display:flex; flex-direction:column; overflow:hidden; background:var(--surface); }
    .search-wrap      { position:relative; }
    .search-icon      { position:absolute; left:12px; top:50%; transform:translateY(-50%); color:var(--text-subtle); pointer-events:none; }
    .search-wrap .inp { padding-left:38px; }
    .pago-btn {
      flex:1; min-width:0;
      padding:7px 6px;
      font-size:11.5px; font-weight:500; font-family:inherit;
      border-radius:var(--r-in);
      border:1px solid var(--border);
      background:transparent;
      color:var(--text-muted);
      cursor:pointer;
      transition:all var(--ease);
      white-space:nowrap;
      text-align:center;
    }
    .pago-btn:hover  { background:var(--surface-2); color:var(--text); }
    .pago-btn.active { background:var(--accent); color:#fff; border-color:var(--accent); }
    .total-row       { display:flex; justify-content:space-between; align-items:baseline; }
    .cobrar-btn {
      width:100%; padding:13px 0; border-radius:var(--r);
      background:var(--success); color:#fff;
      font-size:15px; font-weight:700; letter-spacing:.04em;
      border:none; cursor:pointer; font-family:inherit;
      transition:background var(--ease);
    }
    .cobrar-btn:hover:not(:disabled) { background:var(--success-h); }
    .cobrar-btn:disabled { opacity:.4; cursor:not-allowed; }
    .cancelar-btn {
      width:100%; padding:8px 0; border-radius:var(--r);
      background:transparent; color:var(--danger);
      font-size:13px; font-weight:500;
      border:1px solid rgba(239,68,68,.35); cursor:pointer; font-family:inherit;
      transition:all var(--ease);
    }
    .cancelar-btn:hover { background:rgba(239,68,68,.08); }

    /* HUD Grande — modo pantalla grande / lectura a distancia */
    .hud-grande .inp                     { font-size:18px !important; padding:12px 14px !important; height:auto !important; }
    .hud-grande .inp-lg                  { font-size:22px !important; padding:14px 18px !important; }
    .hud-grande .search-wrap .inp        { padding-left:50px !important; }
    .hud-grande .search-icon             { width:20px !important; height:20px !important; left:14px !important; }
    .hud-grande #btn-producto-libre      { font-size:15px !important; padding:12px 0 !important; }
    /* Carrito items — Tailwind text-sm/text-xs dentro de #carrito */
    .hud-grande #carrito .text-sm        { font-size:17px !important; line-height:1.4 !important; }
    .hud-grande #carrito .text-xs        { font-size:14px !important; }
    .hud-grande #carrito input[type=number] { font-size:18px !important; width:5.5rem !important; }
    .hud-grande #carrito button          { font-size:20px !important; padding:6px 10px !important; }
    .hud-grande #fila-subtotal           { font-size:17px !important; }
    .hud-grande #fila-iva                { font-size:17px !important; }
    .hud-grande #fila-total              { font-size:26px !important; }
    .hud-grande #total                   { font-size:26px !important; }
    .hud-grande #vuelto-display          { font-size:28px !important; }
    .hud-grande .cobrar-btn              { font-size:22px !important; padding:20px 0 !important; }
    .hud-grande .cancelar-btn            { font-size:16px !important; padding:12px 0 !important; }
    .hud-grande .pago-btn                { font-size:14px !important; padding:11px 8px !important; }

    /* Topbar HUD toggle */
    .hud-topbar {
      display:flex; align-items:center; justify-content:flex-end;
      padding:6px 18px; border-bottom:1px solid var(--border);
      background:var(--surface); flex-shrink:0;
    }
    .hud-toggle-btn {
      display:flex; align-items:center; gap:6px;
      padding:5px 10px; border-radius:var(--r-in);
      border:1px solid var(--border); background:transparent;
      color:var(--text-subtle); font-size:12px; font-weight:500;
      font-family:inherit; cursor:pointer; transition:all var(--ease);
    }
    .hud-toggle-btn:hover { background:var(--surface-2); color:var(--text); }
    .hud-toggle-btn.hud-on { background:rgba(59,130,246,.12); border-color:rgba(59,130,246,.4); color:#93c5fd; }
  </style>
</head>
<body class="app-layout">

  <!-- ── Sidebar ─────────────────────────────────────────────── -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-logo-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
      </div>
      <div>
        <div class="sidebar-logo-name">OmaTech POS</div>
        <div class="sidebar-logo-sub">Punto de Venta</div>
      </div>
    </div>
    <nav class="sidebar-nav">
      <a href="caja.html" class="nav-item active">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="13" rx="2"/><path d="M16 7V5a2 2 0 0 0-4 0v2"/><line x1="12" y1="12" x2="12" y2="16"/><line x1="10" y1="14" x2="14" y2="14"/></svg>
        Caja
      </a>
      <a href="catalogo.html" class="nav-item">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
        Catálogo
      </a>
      <a href="clientes.html" class="nav-item">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        Clientes
      </a>
      <a href="informes.html" class="nav-item">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/><line x1="2" y1="20" x2="22" y2="20"/></svg>
        Informes
      </a>
      <a href="proveedores.html" class="nav-item">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
        Proveedores
      </a>
      <a href="turno.html" class="nav-item">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        Turno
      </a>
      <a href="configuracion.html" class="nav-item">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        Configuración
        <span id="badge-sync" class="nav-badge hidden"></span>
      </a>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="sidebar-user-avatar" id="nav-avatar">U</div>
        <div style="overflow:hidden;">
          <div class="sidebar-user-name" id="nav-username">Usuario</div>
          <div class="sidebar-user-role">Administrador</div>
        </div>
      </div>
      <button class="btn-logout" id="btn-logout">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Cerrar sesión
      </button>
    </div>
  </aside>

  <!-- ── Contenido principal ────────────────────────────────── -->
  <div class="page-content">
    <!-- Topbar HUD -->
    <div class="hud-topbar">
      <button id="btn-hud-toggle" class="hud-toggle-btn" title="Alternar tamaño del HUD">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
        HUD Grande
      </button>
    </div>
    <div style="display:flex;flex:1;overflow:hidden;">

      <!-- Panel izquierdo: búsqueda ──────────────────────────── -->
      <section class="caja-panel-left">
        <div style="padding:16px 18px 14px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;">
          <div class="search-wrap">
            <svg class="search-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input
              id="busqueda"
              type="text"
              placeholder="Código de barras o nombre..."
              autocomplete="off"
              autofocus
              class="inp inp-lg"
            />
          </div>
          <button id="btn-producto-libre" type="button" class="btn btn-ghost"
            style="margin-top:8px;width:100%;font-size:12px;color:var(--text-subtle);border-style:dashed;">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Producto Común
          </button>
        </div>
        <div id="resultados-busqueda" style="flex:1;overflow-y:auto;padding:8px;">
          <div class="empty-state">Escribí para buscar artículos</div>
        </div>
      </section>

      <!-- Panel derecho: ticket + cobro ─────────────────────── -->
      <section class="caja-panel-right">

        <!-- Encabezado ticket -->
        <div style="padding:14px 18px 12px;border-bottom:1px solid var(--border);flex-shrink:0;">
          <span style="font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--text-subtle);">Ticket actual</span>
        </div>

        <!-- Carrito -->
        <div id="carrito" style="flex:1;min-height:0;overflow-y:auto;padding:8px 14px;">
          <div class="empty-state">El carrito está vacío</div>
        </div>

        <!-- Footer: totales + pago + botones -->
        <div style="border-top:1px solid var(--border);padding:14px 18px;display:flex;flex-direction:column;gap:12px;background:var(--surface);flex-shrink:0;">

          <!-- Totales -->
          <div style="display:flex;flex-direction:column;gap:5px;">
            <div id="fila-subtotal" class="total-row" style="font-size:13px;color:var(--text-muted);">
              <span>Subtotal</span>
              <span id="subtotal" style="font-variant-numeric:tabular-nums;font-family:monospace;">$0,00</span>
            </div>
            <div id="fila-iva" class="total-row" style="font-size:13px;color:var(--text-muted);">
              <span>IVA (<span id="label-tasa">21</span>%)</span>
              <span id="impuesto" style="font-variant-numeric:tabular-nums;font-family:monospace;">$0,00</span>
            </div>
            <div id="fila-total" class="total-row" style="font-size:17px;font-weight:700;color:var(--text);padding-top:8px;border-top:1px solid var(--border);">
              <span>TOTAL</span>
              <span id="total" style="font-variant-numeric:tabular-nums;font-family:monospace;">$0,00</span>
            </div>
          </div>

          <!-- Selector de forma de pago (oculto, para compatibilidad JS) -->
          <select id="forma-pago" style="display:none;">
            <option value="efectivo">Efectivo</option>
            <option value="tarjeta_debito">Tarjeta débito</option>
            <option value="tarjeta_credito">Tarjeta crédito</option>
            <option value="transferencia">Transferencia</option>
            <option value="cuenta_corriente">Crédito cliente</option>
          </select>

          <!-- Botones toggle forma de pago -->
          <div style="display:flex;gap:4px;">
            <button type="button" class="pago-btn active" data-value="efectivo">Efectivo</button>
            <button type="button" class="pago-btn" data-value="tarjeta_debito">Débito</button>
            <button type="button" class="pago-btn" data-value="tarjeta_credito">Crédito</button>
            <button type="button" class="pago-btn" data-value="transferencia">Transfer.</button>
            <button type="button" class="pago-btn" data-value="cuenta_corriente">Cta. Cte.</button>
          </div>

          <!-- Sección efectivo -->
          <div id="seccion-efectivo" style="display:flex;gap:12px;align-items:flex-start;">
            <div style="flex:1;">
              <div style="font-size:11px;color:var(--text-muted);margin-bottom:5px;">Monto recibido</div>
              <input
                id="monto-recibido"
                type="number"
                min="0"
                step="0.01"
                placeholder="0,00"
                class="inp"
              />
            </div>
            <div style="flex:1;text-align:right;">
              <div style="font-size:11px;color:var(--text-muted);margin-bottom:5px;">Vuelto</div>
              <div id="vuelto-display" style="font-size:18px;font-weight:700;color:var(--text-subtle);font-variant-numeric:tabular-nums;">—</div>
            </div>
          </div>

          <!-- Sección crédito cliente -->
          <div id="seccion-cliente" class="hidden flex-col gap-1.5">
            <div style="font-size:11px;color:var(--text-muted);">Buscar cliente</div>
            <input
              id="buscar-cliente"
              type="text"
              placeholder="Nombre o teléfono..."
              autocomplete="off"
              class="inp"
            />
            <div id="resultados-cliente"
              class="hidden bg-white border border-gray-200 rounded shadow-md max-h-28 overflow-y-auto text-sm">
            </div>
            <div id="cliente-badge"
              style="display:none;align-items:center;justify-content:space-between;background:rgba(59,130,246,.12);border:1px solid rgba(59,130,246,.3);border-radius:var(--r-in);padding:8px 12px;gap:8px;">
              <span id="cliente-nombre" style="font-size:13px;font-weight:500;color:#93c5fd;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;"></span>
              <button id="btn-quitar-cliente" style="background:none;border:none;color:#60a5fa;cursor:pointer;font-size:16px;line-height:1;flex-shrink:0;padding:0;">✕</button>
            </div>
          </div>

          <!-- Error -->
          <div id="error-cobro"
            class="hidden"
            style="padding:8px 12px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);border-radius:var(--r-in);color:#fca5a5;font-size:12px;line-height:1.4;">
          </div>

          <!-- Botones acción -->
          <div style="display:flex;flex-direction:column;gap:6px;">
            <button id="btn-cobrar" class="cobrar-btn">COBRAR</button>
            <button id="btn-cancelar" class="cancelar-btn">Cancelar venta</button>
          </div>

        </div>
      </section>
    </div>
  </div>

  <script>
    // Sincroniza botones toggle con el select oculto
    (function () {
      const btns = document.querySelectorAll('.pago-btn');
      const sel  = document.getElementById('forma-pago');
      btns.forEach(btn => {
        btn.addEventListener('click', () => {
          btns.forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          sel.value = btn.dataset.value;
          sel.dispatchEvent(new Event('change'));
        });
      });
    })();
  </script>
  <!-- ── Modal: Producto Común ──────────────────────────────── -->
  <div id="modal-libre" class="modal-overlay hidden">
    <div class="modal-box" style="max-width:400px;">
      <div class="modal-header">
        <h3 class="modal-title">Producto Común</h3>
        <button class="modal-close" id="btn-cerrar-libre">×</button>
      </div>
      <div class="modal-body">
        <div id="error-libre" class="hidden"
          style="margin-bottom:12px;padding:8px 12px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);border-radius:var(--r-in);color:#fca5a5;font-size:13px;"></div>
        <form id="form-libre" style="display:flex;flex-direction:column;gap:14px;" novalidate>
          <div class="field">
            <label class="field-label">Descripción <span style="color:var(--danger)">*</span></label>
            <input id="libre-desc" type="text" autocomplete="off"
              placeholder="Ej: Coca Cola 500ml" class="inp" />
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
            <div class="field">
              <label class="field-label">Precio unitario <span style="color:var(--danger)">*</span></label>
              <input id="libre-precio" type="number" step="0.01" min="0.01" class="inp" />
            </div>
            <div class="field">
              <label class="field-label">Cantidad</label>
              <input id="libre-cantidad" type="number" step="any" min="0.001" value="1" class="inp" />
            </div>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" id="btn-cancelar-libre" class="btn btn-ghost">Cancelar</button>
        <button type="submit" form="form-libre" class="btn btn-primary">Agregar al carrito</button>
      </div>
    </div>
  </div>

  <div class="toast-wrap" id="toast-wrap"></div>
  <script src="../js/caja.js"></script>
  <script src="../js/nav-badge.js"></script>
</body>
</html>
