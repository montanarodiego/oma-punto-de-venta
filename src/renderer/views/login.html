<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Oma POS — Iniciar sesión</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body class="bg-gray-100 text-gray-800 h-screen flex flex-col">

  <header class="bg-blue-700 text-white px-6 py-3 shadow">
    <h1 class="text-xl font-bold tracking-wide">Oma — Punto de Venta</h1>
  </header>

  <main class="flex-1 flex items-center justify-center p-6">
    <div class="w-full max-w-sm bg-white rounded-lg shadow p-8 flex flex-col gap-5">

      <div class="text-center flex flex-col gap-1">
        <h2 class="text-lg font-semibold text-gray-700">Iniciar sesión</h2>
        <p class="text-xs text-gray-400">Ingresá con tu cuenta OmaTech</p>
      </div>

      <form id="form-login" class="flex flex-col gap-4 text-sm" novalidate>

        <label class="flex flex-col gap-1">
          <span class="text-gray-700 font-medium">Correo electrónico</span>
          <input
            id="email"
            type="email"
            autocomplete="username"
            placeholder="correo@ejemplo.com"
            class="border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400"
          />
        </label>

        <label class="flex flex-col gap-1">
          <span class="text-gray-700 font-medium">Contraseña</span>
          <input
            id="password"
            type="password"
            autocomplete="current-password"
            placeholder="••••••••"
            class="border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400"
          />
        </label>

        <div id="error-msg"
          class="hidden px-3 py-2.5 rounded text-sm text-red-700 bg-red-50 border border-red-200">
        </div>

        <button
          type="submit"
          id="btn-ingresar"
          class="bg-blue-600 hover:bg-blue-700 text-white font-semibold px-6 py-2.5 rounded-lg transition"
        >
          Ingresar
        </button>

      </form>
    </div>
  </main>

  <script src="../js/login.js"></script>
</body>
</html>
