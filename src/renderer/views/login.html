<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Oma POS — Iniciar sesión</title>
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .login-card {
      width: 100%;
      max-width: 360px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-card);
      box-shadow: var(--shadow-lg);
      padding: 36px 32px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }
    .login-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 10px;
      text-align: center;
    }
    .login-logo-icon {
      width: 80px; height: 80px;
      border-radius: 16px;
      display: block;
      margin: 0 auto 4px;
      object-fit: contain;
    }
    .login-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -.01em;
    }
    .login-sub {
      font-size: 13px;
      color: var(--text-muted);
    }
  </style>
</head>
<body>

  <div class="login-card">
    <div class="login-logo">
      <img src="../../../assets/icon.png" class="login-logo-icon" alt="OmaTech POS" />
      <div class="login-title">OmaTech POS</div>
      <div class="login-sub">Ingresá con tu cuenta</div>
    </div>

    <form id="form-login" style="display:flex;flex-direction:column;gap:16px;" novalidate>

      <div class="field">
        <label class="field-label">Usuario</label>
        <input
          id="usuario"
          type="text"
          autocomplete="username"
          placeholder="admin"
          class="inp inp-lg"
        />
      </div>

      <div class="field">
        <label class="field-label">Contraseña</label>
        <input
          id="password"
          type="password"
          autocomplete="current-password"
          placeholder="••••••••"
          class="inp inp-lg"
        />
      </div>

      <div id="error-msg" class="hidden" style="padding:10px 12px;border-radius:var(--r-in);font-size:13px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);color:#fca5a5;line-height:1.4;"></div>

      <button type="submit" id="btn-ingresar" class="btn btn-primary" style="width:100%;padding:11px 0;font-size:14px;font-weight:600;margin-top:4px;">
        Ingresar
      </button>

    </form>
  </div>

  <script src="../js/login.js"></script>
</body>
</html>
