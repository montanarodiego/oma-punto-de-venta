<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Oma POS — Iniciar sesión</title>
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(28px) scale(.97); }
      to   { opacity: 1; transform: translateY(0)    scale(1);   }
    }
    @keyframes glowPulse {
      0%, 100% { box-shadow: 0 0 0 0   rgba(59,130,246,0);    border-radius: 20px; }
      50%       { box-shadow: 0 0 0 12px rgba(59,130,246,.12); border-radius: 20px; }
    }
    @keyframes shimmerPass {
      from { left: -90%; }
      to   { left: 130%; }
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      position: relative;
      overflow: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 65% 50% at 50% 36%, rgba(59,130,246,.09) 0%, transparent 70%),
        radial-gradient(ellipse 40% 30% at 20% 80%, rgba(139,92,246,.06) 0%, transparent 60%);
      pointer-events: none;
    }

    .login-card {
      width: 100%;
      max-width: 360px;
      background: rgba(25,36,55,.75);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 24px;
      box-shadow: 0 8px 40px rgba(0,0,0,.55), 0 0 0 1px rgba(255,255,255,.04) inset;
      padding: 40px 32px 36px;
      display: flex;
      flex-direction: column;
      gap: 28px;
      animation: slideUp .42s cubic-bezier(.4,0,.2,1) both;
    }

    /* Logo */
    .login-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 14px;
      text-align: center;
    }
    .login-logo-icon {
      width: 96px;
      height: 96px;
      border-radius: 20px;
      display: block;
      margin: 0 auto 2px;
      object-fit: contain;
      animation: glowPulse 3.8s ease-in-out infinite;
    }
    .login-title {
      font-size: 20px;
      font-weight: 700;
      color: #f1f5f9;
      letter-spacing: -.02em;
      line-height: 1.2;
    }
    .login-sub {
      font-size: 13px;
      color: #64748b;
      margin-top: -6px;
    }

    /* Floating label fields */
    .float-field {
      position: relative;
    }
    .float-inp {
      width: 100%;
      background: rgba(15,23,42,.55);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 12px;
      color: #f1f5f9;
      padding: 22px 14px 8px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color 150ms ease, box-shadow 150ms ease, background 150ms ease;
    }
    .float-inp::placeholder { color: transparent; }
    .float-inp:hover { border-color: rgba(255,255,255,.18); }
    .float-inp:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59,130,246,.16);
      background: rgba(15,23,42,.75);
    }
    .float-label {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 14px;
      color: #64748b;
      pointer-events: none;
      transition: all 160ms cubic-bezier(.4,0,.2,1);
      transform-origin: left center;
    }
    .float-inp:focus ~ .float-label,
    .float-inp:not(:placeholder-shown) ~ .float-label {
      top: 10px;
      transform: translateY(0) scale(.78);
      color: #3b82f6;
      font-weight: 500;
    }

    /* Error message */
    #error-msg {
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 13px;
      background: rgba(239,68,68,.1);
      border: 1px solid rgba(239,68,68,.25);
      color: #fca5a5;
      line-height: 1.45;
      margin-top: -8px;
    }

    /* Shimmer submit button */
    .btn-login {
      width: 100%;
      padding: 13px 0;
      font-size: 14px;
      font-weight: 600;
      position: relative;
      overflow: hidden;
      background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
      color: #fff;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-family: inherit;
      letter-spacing: .01em;
      transition: transform 150ms ease, box-shadow 150ms ease, opacity 150ms ease;
    }
    .btn-login:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(59,130,246,.38);
    }
    .btn-login:active:not(:disabled) {
      transform: translateY(0);
      box-shadow: none;
    }
    .btn-login:disabled { opacity: .5; cursor: not-allowed; }

    /* Link olvidé contraseña */
    .link-forgot {
      display: block;
      text-align: center;
      font-size: 12px;
      color: #475569;
      margin-top: 2px;
      cursor: pointer;
      background: none;
      border: none;
      font-family: inherit;
      text-decoration: underline;
      text-underline-offset: 3px;
      transition: color 150ms;
      padding: 0;
    }
    .link-forgot:hover { color: #94a3b8; }

    /* Botón secundario (volver) */
    .btn-back {
      display: flex;
      align-items: center;
      gap: 6px;
      background: none;
      border: none;
      color: #475569;
      font-size: 12px;
      cursor: pointer;
      font-family: inherit;
      padding: 0;
      margin-bottom: -12px;
    }
    .btn-back:hover { color: #94a3b8; }

    /* Input de código */
    .code-input {
      width: 100%;
      background: rgba(15,23,42,.55);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 12px;
      color: #f1f5f9;
      padding: 14px;
      font-size: 28px;
      font-family: monospace;
      font-weight: 700;
      letter-spacing: 14px;
      text-align: center;
      outline: none;
      transition: border-color 150ms ease, box-shadow 150ms ease;
    }
    .code-input:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59,130,246,.16);
    }
    .code-input::placeholder { color: #334155; letter-spacing: 10px; }

    /* Hint de expiración */
    .reset-hint {
      font-size: 12px;
      color: #475569;
      text-align: center;
      line-height: 1.5;
    }

    /* Mensaje OK (contraseña cambiada) */
    #reset-ok-msg {
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 13px;
      background: rgba(34,197,94,.1);
      border: 1px solid rgba(34,197,94,.25);
      color: #86efac;
      line-height: 1.45;
      margin-top: -8px;
    }

    .btn-login::after {
      content: '';
      position: absolute;
      top: 0; left: -90%;
      width: 55%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.2), transparent);
      transform: skewX(-18deg);
    }
    .btn-login:hover:not(:disabled)::after {
      animation: shimmerPass .55s ease;
    }
  </style>
</head>
<body>

  <div class="login-card">

    <div class="login-logo">
      <img src="../../../assets/icon.png" class="login-logo-icon" alt="OmaTech POS" />
      <div class="login-title">OmaTech POS</div>
      <div class="login-sub">Ingresá con tu cuenta</div>
    </div>

    <!-- ── Panel: Login ──────────────────────────────────── -->
    <div id="panel-login">
      <form id="form-login" style="display:flex;flex-direction:column;gap:16px;" novalidate>

        <div class="float-field">
          <input id="usuario" type="text" autocomplete="username"
                 placeholder=" " class="float-inp" />
          <label for="usuario" class="float-label">Usuario</label>
        </div>

        <div class="float-field">
          <input id="password" type="password" autocomplete="current-password"
                 placeholder=" " class="float-inp" />
          <label for="password" class="float-label">Contraseña</label>
        </div>

        <div id="error-msg" class="hidden"></div>
        <div id="reset-ok-msg" class="hidden"></div>

        <button type="submit" id="btn-ingresar" class="btn-login" style="margin-top:4px;">
          Ingresar
        </button>

        <button type="button" id="btn-forgot" class="link-forgot">
          ¿Olvidaste tu contraseña?
        </button>

      </form>
    </div>

    <!-- ── Panel: Ingresá tu email ────────────────────────── -->
    <div id="panel-reset-email" style="display:none;">
      <div style="display:flex;flex-direction:column;gap:16px;">

        <button type="button" class="btn-back" id="btn-back-from-email">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" viewBox="0 0 24 24">
            <polyline points="15 18 9 12 15 6"/>
          </svg>
          Volver al login
        </button>

        <div style="font-size:15px;font-weight:700;color:#f1f5f9;">Recuperar contraseña</div>
        <p style="font-size:13px;color:#64748b;margin:0;">Ingresá el email asociado a tu usuario y te enviaremos un código de verificación.</p>

        <div class="float-field">
          <input id="reset-email" type="email" autocomplete="email"
                 placeholder=" " class="float-inp" />
          <label for="reset-email" class="float-label">Email</label>
        </div>

        <div id="reset-email-error" class="hidden"
             style="padding:10px 14px;border-radius:10px;font-size:13px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);color:#fca5a5;line-height:1.45;"></div>

        <button type="button" id="btn-enviar-codigo" class="btn-login" style="margin-top:4px;">
          Enviar código
        </button>

      </div>
    </div>

    <!-- ── Panel: Ingresá el código ───────────────────────── -->
    <div id="panel-reset-codigo" style="display:none;">
      <div style="display:flex;flex-direction:column;gap:16px;">

        <button type="button" class="btn-back" id="btn-back-from-codigo">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" viewBox="0 0 24 24">
            <polyline points="15 18 9 12 15 6"/>
          </svg>
          Volver
        </button>

        <div style="font-size:15px;font-weight:700;color:#f1f5f9;">Ingresá el código</div>
        <p id="reset-codigo-hint" class="reset-hint"></p>

        <input id="reset-codigo" type="text" inputmode="numeric" maxlength="6"
               placeholder="······" class="code-input" autocomplete="one-time-code" />

        <div id="reset-codigo-error" class="hidden"
             style="padding:10px 14px;border-radius:10px;font-size:13px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);color:#fca5a5;line-height:1.45;"></div>

        <p class="reset-hint">El código vence a los 15 minutos.</p>

        <button type="button" id="btn-verificar-codigo" class="btn-login">
          Verificar código
        </button>

      </div>
    </div>

    <!-- ── Panel: Nueva contraseña ───────────────────────── -->
    <div id="panel-reset-pass" style="display:none;">
      <div style="display:flex;flex-direction:column;gap:16px;">

        <div style="font-size:15px;font-weight:700;color:#f1f5f9;">Nueva contraseña</div>
        <p style="font-size:13px;color:#64748b;margin:0;">Elegí una contraseña nueva para tu cuenta.</p>

        <div class="float-field">
          <input id="reset-nueva-pass" type="password" autocomplete="new-password"
                 placeholder=" " class="float-inp" />
          <label for="reset-nueva-pass" class="float-label">Nueva contraseña</label>
        </div>

        <div class="float-field">
          <input id="reset-confirmar-pass" type="password" autocomplete="new-password"
                 placeholder=" " class="float-inp" />
          <label for="reset-confirmar-pass" class="float-label">Confirmar contraseña</label>
        </div>

        <div id="reset-pass-error" class="hidden"
             style="padding:10px 14px;border-radius:10px;font-size:13px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);color:#fca5a5;line-height:1.45;"></div>

        <button type="button" id="btn-cambiar-pass" class="btn-login">
          Cambiar contraseña
        </button>

      </div>
    </div>

  </div>

  <script src="../js/login.js"></script>
</body>
</html>
