<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Oma POS — Informes</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    /* ── Period selector ─────────────────────────────────────── */
    .period-tabs { display:flex; gap:6px; flex-wrap:wrap; flex-shrink:0; }
    .period-tab {
      padding:6px 14px; border-radius:6px; font-size:13px; font-weight:500;
      border:1px solid var(--border); color:var(--text-muted);
      background:var(--surface); cursor:pointer; transition:all .15s;
    }
    .period-tab:hover { border-color:var(--accent); color:var(--text); }
    .period-tab.active { background:var(--accent); border-color:var(--accent); color:#fff; }

    /* ── KPI cards ───────────────────────────────────────────── */
    .kpi-grid {
      display:grid; grid-template-columns:repeat(4,1fr); gap:12px; flex-shrink:0;
    }
    .kpi-card {
      background:var(--surface); border:1px solid var(--border);
      border-radius:10px; padding:16px 18px;
    }
    .kpi-card-label {
      font-size:11px; font-weight:600; text-transform:uppercase;
      letter-spacing:.05em; color:var(--text-muted);
    }
    .kpi-card-value {
      font-size:20px; font-weight:700; font-family:monospace;
      margin-top:5px; color:var(--text);
    }
    .kpi-card-sub { font-size:12px; color:var(--text-subtle); margin-top:3px; min-height:16px; }
    .kpi-variation { font-size:12px; font-weight:600; }
    .kpi-variation.pos { color:#22c55e; }
    .kpi-variation.neg { color:#ef4444; }
    .kpi-variation.neu { color:var(--text-muted); }

    /* ── Chart cards ─────────────────────────────────────────── */
    .chart-card {
      background:var(--surface); border:1px solid var(--border);
      border-radius:10px; padding:16px 18px; flex-shrink:0;
    }
    .chart-card-title {
      font-size:11px; font-weight:600; text-transform:uppercase;
      letter-spacing:.05em; color:var(--text-muted); margin-bottom:12px;
      display:block;
    }

    /* ── Two-column layout ───────────────────────────────────── */
    .two-col { display:grid; grid-template-columns:1fr 1fr; gap:12px; flex-shrink:0; }

    /* ── Payment legend ──────────────────────────────────────── */
    .pago-leyenda { display:flex; flex-direction:column; gap:7px; }
    .pago-leyenda-item { display:flex; align-items:center; gap:7px; font-size:12px; }
    .pago-leyenda-dot { width:9px; height:9px; border-radius:50%; flex-shrink:0; }
    .pago-leyenda-label { flex:1; color:var(--text); }
    .pago-leyenda-pct { color:var(--text-muted); width:38px; text-align:right; font-size:11px; }
    .pago-leyenda-total { font-family:monospace; font-weight:600; color:var(--text); width:96px; text-align:right; }

    /* ── Top 5 list ──────────────────────────────────────────── */
    .top5-list { display:flex; flex-direction:column; gap:10px; }
    .top5-item { display:flex; align-items:center; gap:10px; }
    .top5-rank { font-size:11px; font-weight:700; color:var(--text-muted); width:16px; flex-shrink:0; text-align:right; }
    .top5-info { flex:1; min-width:0; }
    .top5-name { font-size:13px; font-weight:500; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .top5-bar-wrap { height:3px; background:var(--bg); border-radius:2px; margin-top:4px; }
    .top5-bar { height:3px; background:var(--accent); border-radius:2px; transition:width .3s; }
    .top5-amount { font-size:12px; font-weight:600; font-family:monospace; color:var(--text); flex-shrink:0; text-align:right; min-width:90px; }

    /* ── Collapsible detail ──────────────────────────────────── */
    .detail-chevron { font-size:11px; color:var(--text-muted); display:inline-block; transition:transform .2s; }
    .detail-chevron.open { transform:rotate(180deg); }
  </style>
</head>
<body class="app-layout">

  <!-- ── Sidebar ─────────────────────────────────────────────────── -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-logo-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
      </div>
      <div>
        <div class="sidebar-logo-name">OmaTech POS</div>
        <div class="sidebar-logo-sub">Punto de Venta</div>
      </div>
    </div>
    <nav class="sidebar-nav">
      <a href="caja.html" class="nav-item">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="13" rx="2"/><path d="M16 7V5a2 2 0 0 0-4 0v2"/><line x1="12" y1="12" x2="12" y2="16"/><line x1="10" y1="14" x2="14" y2="14"/></svg>
        Caja <span class="nav-fkey">F1</span>
      </a>
      <a href="catalogo.html" class="nav-item">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
        Catálogo <span class="nav-fkey">F2</span>
      </a>
      <a href="clientes.html" class="nav-item">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        Clientes <span class="nav-fkey">F3</span>
      </a>
      <a href="informes.html" class="nav-item active">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/><line x1="2" y1="20" x2="22" y2="20"/></svg>
        Informes <span class="nav-fkey">F5</span>
      </a>
      <a href="proveedores.html" class="nav-item">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
        Proveedores <span class="nav-fkey">F4</span>
      </a>
      <a href="turno.html" class="nav-item">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        Turno <span class="nav-fkey">F6</span>
      </a>
      <a href="configuracion.html" class="nav-item">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        Configuración <span class="nav-fkey">F7</span>
        <span id="badge-sync" class="nav-badge hidden"></span>
      </a>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="sidebar-user-avatar" id="nav-avatar">U</div>
        <div style="overflow:hidden;">
          <div class="sidebar-user-name" id="nav-username">Usuario</div>
          <div class="sidebar-user-role">Administrador</div>
        </div>
      </div>
      <button class="btn-logout" id="btn-logout">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Cerrar sesión
      </button>
    </div>
  </aside>

  <!-- ── Contenido principal ────────────────────────────────────── -->
  <div class="page-content">

    <div class="page-header">
      <h1 class="page-title">Informes</h1>
    </div>

    <main style="flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:14px;">

      <!-- Period selector -->
      <div class="period-tabs">
        <button data-periodo="hoy"          class="period-tab">Hoy</button>
        <button data-periodo="semana"       class="period-tab">Esta semana</button>
        <button data-periodo="mes"          class="period-tab active">Este mes</button>
        <button data-periodo="anio"         class="period-tab">Este año</button>
        <button data-periodo="personalizado" class="period-tab">Personalizado</button>
      </div>

      <!-- Custom date range (shown only for "Personalizado") -->
      <div id="rango-personalizado" style="display:none;align-items:center;gap:10px;flex-shrink:0;">
        <span style="font-size:12px;font-weight:500;color:var(--text-muted)">Desde</span>
        <input id="fecha-desde" type="date" class="inp" style="width:auto;" />
        <span style="color:var(--text-subtle)">→</span>
        <input id="fecha-hasta" type="date" class="inp" style="width:auto;" />
        <button id="btn-aplicar-rango" class="btn btn-primary" style="padding:6px 14px;font-size:12px;">Aplicar</button>
      </div>

      <!-- KPI cards -->
      <div class="kpi-grid">
        <div class="kpi-card" id="kpi-total">
          <div class="kpi-card-label">Total vendido</div>
          <div class="kpi-card-value">—</div>
          <div class="kpi-card-sub"></div>
        </div>
        <div class="kpi-card" id="kpi-ganancia">
          <div class="kpi-card-label">Ganancia bruta</div>
          <div class="kpi-card-value">—</div>
          <div class="kpi-card-sub"></div>
        </div>
        <div class="kpi-card" id="kpi-transacciones">
          <div class="kpi-card-label">Transacciones</div>
          <div class="kpi-card-value">—</div>
          <div class="kpi-card-sub"></div>
        </div>
        <div class="kpi-card" id="kpi-mejor-dia">
          <div class="kpi-card-label">Mejor día</div>
          <div class="kpi-card-value">—</div>
          <div class="kpi-card-sub"></div>
        </div>
      </div>

      <!-- Sales chart -->
      <div class="chart-card">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
          <span class="chart-card-title" id="chart-ventas-title" style="margin-bottom:0;">Ventas por día</span>
        </div>
        <div style="position:relative;height:220px;">
          <canvas id="chart-ventas"></canvas>
        </div>
      </div>

      <!-- Two columns: donut + top 5 -->
      <div class="two-col">

        <!-- Medios de pago -->
        <div class="chart-card">
          <span class="chart-card-title">Medios de pago</span>
          <div style="display:flex;gap:16px;align-items:flex-start;">
            <div style="width:160px;height:160px;flex-shrink:0;">
              <canvas id="chart-formas-pago" width="160" height="160"></canvas>
            </div>
            <div class="pago-leyenda" id="leyenda-formas-pago" style="flex:1;min-width:0;margin-top:4px;"></div>
          </div>
        </div>

        <!-- Top 5 artículos -->
        <div class="chart-card">
          <span class="chart-card-title">Top 5 artículos</span>
          <div class="top5-list" id="top5-articulos"></div>
        </div>

      </div>

      <!-- Detail table (collapsible, closed by default) -->
      <div class="chart-card">
        <div id="btn-toggle-detalle" style="display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;">
          <div style="display:flex;align-items:center;gap:10px;">
            <span class="chart-card-title" style="margin-bottom:0;">Detalle de transacciones</span>
            <span id="detalle-count" style="font-size:12px;color:var(--text-muted);"></span>
          </div>
          <div style="display:flex;align-items:center;gap:10px;">
            <button id="btn-exportar-ventas" class="btn btn-ghost"
              style="font-size:11px;padding:3px 10px;display:flex;align-items:center;gap:4px;"
              onclick="event.stopPropagation()">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
              CSV
            </button>
            <span id="detalle-chevron" class="detail-chevron">▼</span>
          </div>
        </div>
        <div id="detalle-tabla" style="display:none;margin-top:12px;overflow-x:auto;max-height:320px;overflow-y:auto;"></div>
      </div>

      <!-- Additional CSV exports -->
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;flex-shrink:0;padding-bottom:10px;">
        <span style="font-size:11px;color:var(--text-muted);font-weight:600;line-height:28px;margin-right:2px;">Exportar:</span>
        <button id="btn-exportar-articulos" class="btn btn-ghost" style="font-size:11px;padding:4px 12px;">CSV Artículos vendidos</button>
        <button id="btn-exportar-utilidad"  class="btn btn-ghost" style="font-size:11px;padding:4px 12px;">CSV Utilidad bruta</button>
        <button id="btn-exportar-saldos"    class="btn btn-ghost" style="font-size:11px;padding:4px 12px;">CSV Saldos clientes</button>
      </div>

    </main>
  </div>

  <div class="toast-wrap" id="toast-wrap"></div>
  <script src="../../../node_modules/chart.js/dist/chart.umd.js"></script>
  <script src="../js/hotkeys.js"></script>
  <script src="../js/informes.js"></script>
  <script src="../js/nav-badge.js"></script>
</body>
</html>
