<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Oma POS — Informes</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body class="bg-gray-100 text-gray-800 h-screen flex flex-col">

  <header class="bg-blue-700 text-white px-6 py-3 flex items-center justify-between shadow">
    <h1 class="text-xl font-bold tracking-wide">Oma — Punto de Venta</h1>
    <nav class="flex gap-4 text-sm font-medium items-center">
      <a href="caja.html"          class="px-3 py-1 rounded hover:bg-blue-600">Caja</a>
      <a href="catalogo.html"      class="px-3 py-1 rounded hover:bg-blue-600">Catálogo</a>
      <a href="clientes.html"      class="px-3 py-1 rounded hover:bg-blue-600">Clientes</a>
      <a href="informes.html"      class="px-3 py-1 rounded bg-blue-900">Informes</a>
      <a href="configuracion.html" class="px-3 py-1 rounded hover:bg-blue-600">Configuración</a>
      <span id="badge-sync"
        class="hidden text-xs bg-yellow-400 text-yellow-900 font-semibold px-2 py-0.5 rounded-full">
      </span>
    </nav>
  </header>

  <main class="flex flex-col flex-1 overflow-hidden px-6 pt-4 pb-6 gap-3">

    <!-- ── Tabs ──────────────────────────────────────────────── -->
    <div class="flex bg-white rounded-lg shadow text-sm shrink-0 overflow-hidden">
      <button data-tab="ventas"
        class="tab-btn flex-1 px-3 py-2.5 font-medium transition bg-blue-600 text-white">
        Ventas por período
      </button>
      <button data-tab="articulos"
        class="tab-btn flex-1 px-3 py-2.5 font-medium transition text-gray-600 hover:bg-gray-50 border-l border-gray-200">
        Artículos más vendidos
      </button>
      <button data-tab="utilidad"
        class="tab-btn flex-1 px-3 py-2.5 font-medium transition text-gray-600 hover:bg-gray-50 border-l border-gray-200">
        Utilidad bruta
      </button>
      <button data-tab="saldos"
        class="tab-btn flex-1 px-3 py-2.5 font-medium transition text-gray-600 hover:bg-gray-50 border-l border-gray-200">
        Saldos de clientes
      </button>
    </div>

    <!-- ── Filtro de fechas (oculto en "Saldos") ─────────────── -->
    <div id="filtro-fechas"
      class="flex items-center gap-3 bg-white rounded-lg shadow px-4 py-3 shrink-0">
      <span class="text-sm text-gray-600 font-medium">Período</span>
      <input id="fecha-desde" type="date"
        class="border border-gray-300 rounded px-2 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400" />
      <span class="text-gray-400">→</span>
      <input id="fecha-hasta" type="date"
        class="border border-gray-300 rounded px-2 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400" />
    </div>

    <!-- ══════════════════════════════════════════════════════════
         PANEL 1 — Ventas por período
    ══════════════════════════════════════════════════════════ -->
    <div id="panel-ventas" class="flex-col flex-1 min-h-0 gap-3" style="display:flex">
      <div class="flex items-center gap-2 shrink-0">
        <button id="btn-generar-ventas"
          class="bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium px-4 py-2 rounded transition">
          Generar informe
        </button>
        <button id="btn-exportar-ventas" disabled
          class="border border-gray-300 text-gray-500 text-sm px-4 py-2 rounded transition
                 hover:bg-gray-50 disabled:opacity-40 disabled:cursor-not-allowed">
          Exportar CSV
        </button>
      </div>
      <div id="resultado-ventas" class="flex-1 overflow-y-auto flex flex-col gap-3">
        <div class="py-12 text-center text-gray-400 text-sm">
          Seleccioná un período y presioná "Generar informe"
        </div>
      </div>
    </div>

    <!-- ══════════════════════════════════════════════════════════
         PANEL 2 — Artículos más vendidos
    ══════════════════════════════════════════════════════════ -->
    <div id="panel-articulos" class="flex-col flex-1 min-h-0 gap-3" style="display:none">
      <div class="flex items-center gap-2 shrink-0">
        <button id="btn-generar-articulos"
          class="bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium px-4 py-2 rounded transition">
          Generar informe
        </button>
        <button id="btn-exportar-articulos" disabled
          class="border border-gray-300 text-gray-500 text-sm px-4 py-2 rounded transition
                 hover:bg-gray-50 disabled:opacity-40 disabled:cursor-not-allowed">
          Exportar CSV
        </button>
      </div>
      <div id="resultado-articulos" class="flex-1 overflow-y-auto">
        <div class="py-12 text-center text-gray-400 text-sm">
          Seleccioná un período y presioná "Generar informe"
        </div>
      </div>
    </div>

    <!-- ══════════════════════════════════════════════════════════
         PANEL 3 — Utilidad bruta
    ══════════════════════════════════════════════════════════ -->
    <div id="panel-utilidad" class="flex-col flex-1 min-h-0 gap-3" style="display:none">
      <div class="flex items-center gap-2 shrink-0">
        <button id="btn-generar-utilidad"
          class="bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium px-4 py-2 rounded transition">
          Generar informe
        </button>
        <button id="btn-exportar-utilidad" disabled
          class="border border-gray-300 text-gray-500 text-sm px-4 py-2 rounded transition
                 hover:bg-gray-50 disabled:opacity-40 disabled:cursor-not-allowed">
          Exportar CSV
        </button>
      </div>
      <div id="resultado-utilidad" class="flex-1 overflow-y-auto flex flex-col gap-3">
        <div class="py-12 text-center text-gray-400 text-sm">
          Seleccioná un período y presioná "Generar informe"
        </div>
      </div>
    </div>

    <!-- ══════════════════════════════════════════════════════════
         PANEL 4 — Saldos de clientes
    ══════════════════════════════════════════════════════════ -->
    <div id="panel-saldos" class="flex-col flex-1 min-h-0 gap-3" style="display:none">
      <div class="flex items-center gap-2 shrink-0">
        <button id="btn-generar-saldos"
          class="bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium px-4 py-2 rounded transition">
          Generar informe
        </button>
        <button id="btn-exportar-saldos" disabled
          class="border border-gray-300 text-gray-500 text-sm px-4 py-2 rounded transition
                 hover:bg-gray-50 disabled:opacity-40 disabled:cursor-not-allowed">
          Exportar CSV
        </button>
      </div>
      <div id="resultado-saldos" class="flex-1 overflow-y-auto flex flex-col gap-3">
        <div class="py-12 text-center text-gray-400 text-sm">
          Presioná "Generar informe" para ver los saldos actuales
        </div>
      </div>
    </div>

  </main>

  <script src="../js/informes.js"></script>
  <script src="../js/nav-badge.js"></script>
</body>
</html>
