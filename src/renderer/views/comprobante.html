<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Comprobante</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Courier New', Courier, monospace;
      background: #f3f4f6;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 24px 16px;
    }

    .wrap {
      width: 100%;
      max-width: 380px;
    }

    #ticket {
      background: #fff;
      border-radius: 6px;
      box-shadow: 0 2px 12px rgba(0,0,0,.12);
      padding: 24px 22px;
      font-size: 13px;
      color: #1f2937;
    }

    .ticket-header {
      text-align: center;
      margin-bottom: 14px;
    }

    #nombre-negocio {
      font-size: 15px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .05em;
    }

    #fecha, #ticket-num {
      font-size: 11px;
      color: #6b7280;
      margin-top: 2px;
    }

    hr.dashed {
      border: none;
      border-top: 1px dashed #d1d5db;
      margin: 14px 0;
    }

    .items-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
      margin-bottom: 4px;
    }

    .items-table thead tr th {
      color: #6b7280;
      font-weight: normal;
      border-bottom: 1px dashed #e5e7eb;
      padding-bottom: 6px;
      font-size: 11px;
    }

    .items-table thead tr th:first-child { text-align: left; }
    .items-table thead tr th:not(:first-child) { text-align: right; }

    .items-table tbody tr td { padding: 5px 0; border-bottom: 1px dashed #f3f4f6; }
    .items-table tbody tr td:first-child { text-align: left; padding-right: 8px; }
    .items-table tbody tr td:not(:first-child) { text-align: right; }

    .totals { font-size: 13px; }

    .total-line {
      display: flex;
      justify-content: space-between;
      padding: 2px 0;
      color: #4b5563;
    }

    .total-line.grand {
      font-size: 15px;
      font-weight: 700;
      color: #111827;
      padding-top: 10px;
      border-top: 1px solid #d1d5db;
      margin-top: 4px;
    }

    .payment-section { font-size: 12px; }

    .pay-line {
      display: flex;
      justify-content: space-between;
      padding: 2px 0;
    }

    .pay-label { color: #6b7280; }
    .pay-value { font-weight: 500; }

    .vuelto-value { color: #15803d; font-weight: 700; }
    .cliente-value { color: #1d4ed8; font-weight: 500; text-align: right; max-width: 60%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .ticket-footer {
      text-align: center;
      font-size: 11px;
      color: #d1d5db;
      margin-top: 18px;
    }

    .no-print {
      display: flex;
      gap: 8px;
      margin-top: 16px;
    }

    .btn-print {
      flex: 1;
      padding: 10px;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
    }

    .btn-print:hover { background: #1d4ed8; }

    .btn-close {
      flex: 1;
      padding: 10px;
      background: #fff;
      color: #374151;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      font-family: inherit;
    }

    .btn-close:hover { background: #f9fafb; }

    @media print {
      .no-print { display: none !important; }
      body { background: #fff; padding: 0; }
      #ticket { box-shadow: none; border-radius: 0; }
      .wrap { max-width: 100%; }
    }
  </style>
</head>
<body>
  <div class="wrap">

    <div id="ticket">

      <div class="ticket-header">
        <div id="nombre-negocio"></div>
        <div id="fecha"></div>
        <div id="ticket-num"></div>
      </div>

      <hr class="dashed" />

      <table class="items-table">
        <thead>
          <tr>
            <th>Artículo</th>
            <th>Cant</th>
            <th>P.U.</th>
            <th>Total</th>
          </tr>
        </thead>
        <tbody id="items-table"></tbody>
      </table>

      <hr class="dashed" />

      <div class="totals">
        <div id="fila-subtotal" class="total-line">
          <span>Subtotal</span>
          <span id="subtotal"></span>
        </div>
        <div id="fila-descuento-global" class="total-line" style="display:none;color:#b45309;">
          <span id="label-desc-global">Descuento</span>
          <span id="desc-global-monto"></span>
        </div>
        <div id="fila-iva" class="total-line">
          <span id="label-iva">IVA</span>
          <span id="impuesto"></span>
        </div>
        <div id="fila-propina" class="total-line" style="display:none;">
          <span>Propina</span>
          <span id="propina-monto"></span>
        </div>
        <div class="total-line grand">
          <span>TOTAL</span>
          <span id="total"></span>
        </div>
      </div>

      <div id="seccion-notas" style="display:none;margin-top:10px;font-size:11px;color:#6b7280;border-top:1px dashed #d1d5db;padding-top:10px;">
        <div style="font-weight:600;margin-bottom:3px;">Nota:</div>
        <div id="notas-texto" style="line-height:1.4;"></div>
      </div>

      <hr class="dashed" />

      <div class="payment-section">
        <div class="pay-line">
          <span class="pay-label">Forma de pago</span>
          <span id="forma-pago" class="pay-value"></span>
        </div>

        <div id="seccion-efectivo" class="hidden">
          <div class="pay-line">
            <span class="pay-label">Recibido</span>
            <span id="recibido" class="pay-value"></span>
          </div>
          <div class="pay-line">
            <span class="pay-label">Vuelto</span>
            <span id="vuelto" class="vuelto-value"></span>
          </div>
        </div>

        <div id="seccion-cliente" class="hidden">
          <div class="pay-line">
            <span class="pay-label">Cliente</span>
            <span id="nombre-cliente" class="cliente-value"></span>
          </div>
        </div>
      </div>

      <div class="ticket-footer">— Gracias por su compra —</div>
    </div>

    <div class="no-print">
      <button class="btn-print" onclick="window.print()">Imprimir</button>
      <button class="btn-close" onclick="window.close()">Cerrar</button>
    </div>
  </div>

  <script src="../js/comprobante.js"></script>
</body>
</html>
