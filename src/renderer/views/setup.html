<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OmaTech POS — Configuración inicial</title>
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(28px) scale(.97); }
      to   { opacity: 1; transform: translateY(0)    scale(1);   }
    }
    @keyframes glowPulse {
      0%, 100% { box-shadow: 0 0 0 0   rgba(59,130,246,0);    border-radius: 20px; }
      50%       { box-shadow: 0 0 0 14px rgba(59,130,246,.11); border-radius: 20px; }
    }
    @keyframes shimmerPass {
      from { left: -90%; }
      to   { left: 130%; }
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      position: relative;
      overflow: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 70% 55% at 50% 30%, rgba(59,130,246,.08) 0%, transparent 70%),
        radial-gradient(ellipse 45% 35% at 15% 85%, rgba(139,92,246,.06) 0%, transparent 60%),
        radial-gradient(ellipse 40% 30% at 85% 75%, rgba(34,197,94,.04) 0%, transparent 60%);
      pointer-events: none;
    }

    /* ── Card ──────────────────────────────────────────────────── */
    .setup-card {
      width: 100%;
      max-width: 400px;
      background: rgba(25,36,55,.78);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
      border: 1px solid rgba(255,255,255,.09);
      border-radius: 24px;
      box-shadow: 0 8px 48px rgba(0,0,0,.6), 0 0 0 1px rgba(255,255,255,.04) inset;
      padding: 40px 36px 36px;
      display: flex;
      flex-direction: column;
      gap: 0;
      animation: slideUp .42s cubic-bezier(.4,0,.2,1) both;
    }

    /* ── Logo ──────────────────────────────────────────────────── */
    .setup-logo {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      text-align: center;
      margin-bottom: 28px;
    }
    .setup-logo-icon {
      width: 84px;
      height: 84px;
      border-radius: 20px;
      display: block;
      object-fit: contain;
      animation: glowPulse 4s ease-in-out infinite;
    }
    .setup-brand {
      font-size: 22px;
      font-weight: 800;
      color: #f1f5f9;
      letter-spacing: -.03em;
      line-height: 1.1;
    }
    .setup-tagline {
      font-size: 12px;
      color: #475569;
      letter-spacing: .02em;
      margin-top: -4px;
    }

    /* ── Welcome panel ─────────────────────────────────────────── */
    #panel-welcome {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .welcome-heading {
      font-size: 17px;
      font-weight: 700;
      color: #f1f5f9;
      letter-spacing: -.02em;
      text-align: center;
    }
    .welcome-sub {
      font-size: 13px;
      color: #64748b;
      text-align: center;
      line-height: 1.6;
      margin-top: -6px;
      margin-bottom: 6px;
    }

    /* ── Register panel ────────────────────────────────────────── */
    #panel-register {
      display: none;
      flex-direction: column;
      gap: 14px;
    }

    .panel-title {
      font-size: 16px;
      font-weight: 700;
      color: #f1f5f9;
      letter-spacing: -.02em;
    }

    /* ── Floating label fields ─────────────────────────────────── */
    .float-field { position: relative; }
    .float-inp {
      width: 100%;
      background: rgba(15,23,42,.55);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 12px;
      color: #f1f5f9;
      padding: 22px 14px 8px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color 150ms ease, box-shadow 150ms ease, background 150ms ease;
    }
    .float-inp::placeholder { color: transparent; }
    .float-inp:hover { border-color: rgba(255,255,255,.18); }
    .float-inp:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59,130,246,.16);
      background: rgba(15,23,42,.75);
    }
    .float-label {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 14px;
      color: #64748b;
      pointer-events: none;
      transition: all 160ms cubic-bezier(.4,0,.2,1);
      transform-origin: left center;
    }
    .float-inp:focus ~ .float-label,
    .float-inp:not(:placeholder-shown) ~ .float-label {
      top: 10px;
      transform: translateY(0) scale(.78);
      color: #3b82f6;
      font-weight: 500;
    }
    .field-opt {
      position: absolute;
      right: 14px;
      top: 10px;
      font-size: 10px;
      color: #334155;
      font-weight: 600;
      letter-spacing: .03em;
      text-transform: uppercase;
      pointer-events: none;
    }

    /* ── Buttons ───────────────────────────────────────────────── */
    .btn-setup-primary {
      width: 100%;
      padding: 13px 0;
      font-size: 14px;
      font-weight: 700;
      position: relative;
      overflow: hidden;
      background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
      color: #fff;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-family: inherit;
      letter-spacing: .01em;
      transition: transform 150ms ease, box-shadow 150ms ease, opacity 150ms ease;
    }
    .btn-setup-primary:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 6px 22px rgba(59,130,246,.4);
    }
    .btn-setup-primary:active:not(:disabled) { transform: translateY(0); }
    .btn-setup-primary:disabled { opacity: .5; cursor: not-allowed; }
    .btn-setup-primary::after {
      content: '';
      position: absolute;
      top: 0; left: -90%;
      width: 55%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.18), transparent);
      transform: skewX(-18deg);
    }
    .btn-setup-primary:hover:not(:disabled)::after {
      animation: shimmerPass .55s ease;
    }

    .btn-setup-ghost {
      width: 100%;
      padding: 12px 0;
      font-size: 13px;
      font-weight: 600;
      background: transparent;
      color: #64748b;
      border: 1.5px solid rgba(255,255,255,.08);
      border-radius: 12px;
      cursor: pointer;
      font-family: inherit;
      transition: border-color 150ms ease, color 150ms ease, background 150ms ease;
    }
    .btn-setup-ghost:hover {
      border-color: rgba(255,255,255,.16);
      color: #94a3b8;
      background: rgba(255,255,255,.03);
    }

    .btn-back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: none;
      border: none;
      color: #475569;
      font-size: 12px;
      cursor: pointer;
      font-family: inherit;
      padding: 0;
      margin-bottom: -2px;
      transition: color 150ms;
    }
    .btn-back:hover { color: #94a3b8; }

    /* ── Error / divider ───────────────────────────────────────── */
    .setup-error {
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 13px;
      background: rgba(239,68,68,.1);
      border: 1px solid rgba(239,68,68,.25);
      color: #fca5a5;
      line-height: 1.45;
      margin-top: -4px;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #1e293b;
      font-size: 11px;
      margin: 2px 0;
    }
    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,.06);
    }
  </style>
</head>
<body>

  <div class="setup-card">

    <!-- ── Logo siempre visible ──────────────────────────────── -->
    <div class="setup-logo">
      <img src="../../../assets/icon.png" class="setup-logo-icon" alt="OmaTech POS" />
      <div class="setup-brand">OmaTech POS</div>
      <div class="setup-tagline">Sistema de Punto de Venta</div>
    </div>

    <!-- ── Panel: Bienvenida ─────────────────────────────────── -->
    <div id="panel-welcome">
      <div class="welcome-heading">Bienvenido</div>
      <div class="welcome-sub">
        Es la primera vez que abrís la app en este equipo.<br>
        ¿Cómo querés continuar?
      </div>

      <button type="button" id="btn-ir-registro" class="btn-setup-primary">
        Crear cuenta nueva
      </button>

      <div class="divider">o</div>

      <button type="button" id="btn-ir-login" class="btn-setup-ghost">
        Ya tengo una cuenta
      </button>
    </div>

    <!-- ── Panel: Registrar cuenta ──────────────────────────── -->
    <div id="panel-register">

      <button type="button" id="btn-back" class="btn-back">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" viewBox="0 0 24 24">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
        Volver
      </button>

      <div class="panel-title">Crear cuenta de administrador</div>

      <form id="form-register" style="display:flex;flex-direction:column;gap:12px;" novalidate>

        <div class="float-field">
          <input id="r-nombre" type="text" autocomplete="name"
                 placeholder=" " class="float-inp" />
          <label for="r-nombre" class="float-label">Nombre completo</label>
        </div>

        <div class="float-field">
          <input id="r-usuario" type="text" autocomplete="username"
                 placeholder=" " class="float-inp" />
          <label for="r-usuario" class="float-label">Usuario (para iniciar sesión)</label>
        </div>

        <div class="float-field" style="position:relative;">
          <input id="r-email" type="email" autocomplete="email"
                 placeholder=" " class="float-inp" />
          <label for="r-email" class="float-label">Email</label>
          <span class="field-opt">Opcional</span>
        </div>

        <div class="float-field">
          <input id="r-password" type="password" autocomplete="new-password"
                 placeholder=" " class="float-inp" />
          <label for="r-password" class="float-label">Contraseña</label>
        </div>

        <div class="float-field">
          <input id="r-confirmar" type="password" autocomplete="new-password"
                 placeholder=" " class="float-inp" />
          <label for="r-confirmar" class="float-label">Confirmar contraseña</label>
        </div>

        <div id="register-error" class="setup-error hidden"></div>

        <button type="submit" id="btn-crear" class="btn-setup-primary" style="margin-top:4px;">
          Crear cuenta
        </button>

      </form>
    </div>

  </div>

  <script src="../js/setup.js"></script>
</body>
</html>
