<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Oma POS — Configuración</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body class="bg-gray-100 text-gray-800 h-screen flex flex-col">

  <header class="bg-blue-700 text-white px-6 py-3 flex items-center justify-between shadow">
    <h1 class="text-xl font-bold tracking-wide">Oma — Punto de Venta</h1>
    <nav class="flex gap-4 text-sm font-medium items-center">
      <a href="caja.html"          class="px-3 py-1 rounded hover:bg-blue-600">Caja</a>
      <a href="catalogo.html"      class="px-3 py-1 rounded hover:bg-blue-600">Catálogo</a>
      <a href="clientes.html"      class="px-3 py-1 rounded hover:bg-blue-600">Clientes</a>
      <a href="informes.html"      class="px-3 py-1 rounded hover:bg-blue-600">Informes</a>
      <a href="configuracion.html" class="px-3 py-1 rounded bg-blue-900">Configuración</a>
      <span id="badge-sync"
        class="hidden text-xs bg-yellow-400 text-yellow-900 font-semibold px-2 py-0.5 rounded-full">
      </span>
    </nav>
  </header>

  <main class="flex-1 overflow-y-auto p-6">
    <div class="max-w-xl mx-auto flex flex-col gap-5">

      <h2 class="text-xl font-semibold text-gray-700">Configuración del sistema</h2>

      <form id="form-config" class="flex flex-col gap-5 text-sm" novalidate>

        <!-- ── Datos del negocio ─────────────────────────────── -->
        <div class="bg-white rounded-lg shadow p-6 flex flex-col gap-4">
          <h3 class="text-sm font-semibold text-gray-500 uppercase tracking-wide border-b border-gray-200 pb-2">
            Datos del negocio
          </h3>

          <label class="flex flex-col gap-1">
            <span class="text-gray-700 font-medium">Nombre del negocio</span>
            <input
              name="nombre_negocio"
              type="text"
              autocomplete="off"
              placeholder="Ej: Oma Distribuciones"
              class="border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400"
            />
          </label>

          <label class="flex flex-col gap-1">
            <span class="text-gray-700 font-medium">Dirección</span>
            <input
              name="direccion"
              type="text"
              autocomplete="off"
              placeholder="Ej: Av. Corrientes 1234, Buenos Aires"
              class="border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400"
            />
          </label>

          <div class="grid grid-cols-2 gap-4">
            <label class="flex flex-col gap-1">
              <span class="text-gray-700 font-medium">Teléfono</span>
              <input
                name="telefono"
                type="text"
                autocomplete="off"
                placeholder="Ej: 011-4567-8900"
                class="border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400"
              />
            </label>

            <label class="flex flex-col gap-1">
              <span class="text-gray-700 font-medium">CUIT</span>
              <input
                name="cuit"
                type="text"
                autocomplete="off"
                placeholder="Ej: 30-12345678-9"
                class="border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400"
              />
            </label>
          </div>
        </div>

        <!-- ── Parámetros del sistema ────────────────────────── -->
        <div class="bg-white rounded-lg shadow p-6 flex flex-col gap-4">
          <h3 class="text-sm font-semibold text-gray-500 uppercase tracking-wide border-b border-gray-200 pb-2">
            Parámetros del sistema
          </h3>

          <div class="grid grid-cols-2 gap-4">
            <label class="flex flex-col gap-1">
              <span class="text-gray-700 font-medium">Tasa de IVA (%)</span>
              <input
                name="tasa_iva"
                type="number"
                step="0.1"
                min="0"
                max="100"
                placeholder="21"
                class="border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400"
              />
              <span class="text-xs text-gray-400">Se aplica en caja e informes</span>
            </label>

            <label class="flex flex-col gap-1">
              <span class="text-gray-700 font-medium">Símbolo de moneda</span>
              <input
                name="moneda"
                type="text"
                maxlength="5"
                autocomplete="off"
                placeholder="$"
                class="border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400"
              />
              <span class="text-xs text-gray-400">Ej: $, USD, €</span>
            </label>
          </div>
        </div>

        <!-- ── Sincronización ───────────────────────────────── -->
        <div class="bg-white rounded-lg shadow p-6 flex flex-col gap-4">
          <h3 class="text-sm font-semibold text-gray-500 uppercase tracking-wide border-b border-gray-200 pb-2">
            Sincronización con la nube
          </h3>
          <div class="flex items-center gap-4">
            <button
              type="button"
              id="btn-sync"
              class="bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium px-4 py-2 rounded-lg transition"
            >
              Sincronizar ahora
            </button>
            <span id="sync-resultado" class="text-sm text-gray-500"></span>
          </div>
        </div>

        <!-- ── Mensaje de estado ─────────────────────────────── -->
        <div id="mensaje" class="hidden px-4 py-3 rounded-lg text-sm text-center font-medium"></div>

        <!-- ── Botón guardar ─────────────────────────────────── -->
        <button
          type="submit"
          id="btn-guardar"
          class="bg-blue-600 hover:bg-blue-700 text-white font-semibold px-6 py-2.5 rounded-lg transition"
        >
          Guardar cambios
        </button>

      </form>
    </div>
  </main>

  <script src="../js/configuracion.js"></script>
  <script src="../js/nav-badge.js"></script>
</body>
</html>
